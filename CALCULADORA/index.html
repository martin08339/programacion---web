<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Básica</title>
    <link rel="stylesheet" href="./miEstilo.css">
</head>
<body>
   
        <table id="tabla1" border="0" class="tab">
            <tbody>
               
                <tr><td>Número 1:</td><td><input type="number" id="number1" placeholder="0"></td></tr>
                <tr><td>Número 2:</td><td><input type="number" id="number2" placeholder="0"></td></tr>
                
                <tr><td><h1>( + )</h1></td><td ><input name="tm" type="radio" value="suma" checked></td></tr>
                <tr><td><h1>( - )</h1></td><td><input name="tm" type="radio" value="resta"></td></tr>
                <tr><td><h1>( * )</h1></td><td><input name="tm" type="radio" value="multi"></td></tr>
                
                <tr>
                    <td colspan="2">
                        <button onclick="calcular()">Calcular Resultado</button>
                    </td>
                </tr>
            </tbody>
        </table>
    <script src="./miScript.js"> </script>
    
</body>
</html>
